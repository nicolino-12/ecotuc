version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: ecotuc-db
    restart: always
    environment:
      POSTGRES_DB: ecotuc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Ejecución automática del script de inicialización en el primer arranque
      - ./database/init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/2-seeds.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecotuc-backend
    restart: always
    depends_on:
      - db
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=ecotuc
      - JWT_SECRET=ecotuc-jwt-secret-key-2026-dynamic
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: ecotuc-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api

volumes:
  pgdata:
